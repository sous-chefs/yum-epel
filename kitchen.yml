---
driver:
  name: vagrant

transport:
  max_wait_until_ready: 600
  connection_retries: 10
  connection_retry_sleep: 10

provisioner:
  name: chef_infra
  product_name: chef
  product_version: latest
  channel: stable
  deprecations_as_errors: true
  chef_license: accept
  enforce_idempotency: true
  multiple_converge: 2

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  all: &all_run_list
    - recipe[test::all]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  all: &all_verifier
    inspec_tests:
      - path: test/integration/all

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier

  - name: all
    run_list: *all_run_list
    verifier: *all_verifier
